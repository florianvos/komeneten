<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen &mdash; Komen Eten 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --ke-brown: #6B3A2A;
      --ke-warm:  #C05A2B;
      --ke-gold:  #E8A84C;
      --ke-cream: #FBF5EC;
    }
    body {
      background-color: var(--ke-cream);
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(107,58,42,.15);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }
    .brand-title {
      font-size: 2rem;
      color: var(--ke-brown);
      font-weight: bold;
      letter-spacing: -.5px;
      margin-bottom: .25rem;
    }
    .brand-sub {
      color: var(--ke-warm);
      font-size: 1rem;
      margin-bottom: 1.75rem;
    }
    .btn-login {
      background-color: var(--ke-warm);
      border-color: var(--ke-warm);
      color: #fff;
      font-size: 1rem;
      padding: .6rem;
    }
    .btn-login:hover {
      background-color: var(--ke-brown);
      border-color: var(--ke-brown);
    }
    label { color: var(--ke-brown); font-weight: 600; font-family: system-ui, sans-serif; }
    .form-control:focus {
      border-color: var(--ke-warm);
      box-shadow: 0 0 0 .2rem rgba(192,90,43,.2);
    }
    .login-hint {
      font-size: .8rem;
      font-family: system-ui, sans-serif;
      color: #888;
      text-align: center;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="text-center">
      <div class="brand-title">Komen Eten</div>
      <div class="brand-sub">Zomer 2026 &mdash; Jullie competitie</div>
    </div>

    {% for message in messages %}
    <div class="alert alert-danger py-2 px-3" role="alert" style="font-family:system-ui,sans-serif;font-size:.9rem;">
      {{ message }}
    </div>
    {% endfor %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="username" class="form-label">Gebruikersnaam</label>
        <input type="text" name="username" id="username" class="form-control"
               placeholder="bv. florian_afra" autofocus autocomplete="username" required>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Wachtwoord</label>
        <input type="password" name="password" id="password" class="form-control"
               placeholder="Jouw wachtwoord" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-login w-100">Inloggen</button>
    </form>

    <p class="login-hint">
      Couples: florian_afra &bull; philippe_lena &bull; brecht_ragna
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
